name: Auto-Generate Categorized Photos JSON List
on:
  push:
    paths:
      - 'images/**'
  workflow_dispatch: # Allows you to manually trigger a sync with one click

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Scan Categorized Folders and Build JSON
        run: |
          # 1. Setup shell choices and declare baseline categories
          shopt -s nullglob
          categories=("chapter-rides" "community-service" "the-open-road" "leadership" "veteran-escorts" "fundraisers" "uncategorized")
          cat_count=${#categories[@]}

          # 2. Open the main wrapper object
          echo "{" > photos.json

          # 3. Inject the explicit array order map
          echo "  \"categoryOrder\": [" >> photos.json
          for ((i=0; i<cat_count; i++)); do
            if [ $i -lt $((cat_count - 1)) ]; then
              echo "    \"${categories[$i]}\"," >> photos.json
            else
              echo "    \"${categories[$i]}\"" >> photos.json
            fi
          done
          echo "  ]," >> photos.json

          # 4. Open the nested album entries block
          echo "  \"albums\": {" >> photos.json

          # 5. Process files within category directories sequentially
          for ((i=0; i<cat_count; i++)); do
            cat_slug="${categories[$i]}"
            
            case "$cat_slug" in
              "chapter-rides")     cat_title="Chapter Rides" ;;
              "community-service")  cat_title="Community Service" ;;
              "the-open-road")      cat_title="The Open Road" ;;
              "leadership")         cat_title="Leadership" ;;
              "veteran-escorts")    cat_title="Veteran Escorts" ;;
              "fundraisers")        cat_title="Fundraisers" ;;
              "uncategorized")      cat_title="Uncategorized Media" ;;
            esac

            echo "    \"$cat_slug\": [" >> photos.json
            first_file=true

            for file in images/$cat_slug/*.{jpg,jpeg,png,webp,JPG,JPEG,PNG,WEBP}; do
              filename=$(basename "$file")
              clean_caption=$(echo "${filename%.*}" | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++)sub(/./,toupper(substr($i,1,1)),$i)}1')
              
              if [ "$first_file" = true ]; then
                first_file=false
              else
                echo "," >> photos.json
              fi
              
              echo "      {" >> photos.json
              echo "        \"path\": \"images/$cat_slug/$filename\"," >> photos.json
              echo "        \"title\": \"$cat_title\"," >> photos.json
              echo "        \"caption\": \"$clean_caption\"" >> photos.json
              echo -n "      }" >> photos.json
            done

            echo "" >> photos.json
            
            # Close this specific array block nicely
            if [ $i -lt $((cat_count - 1)) ]; then
              echo "    ]," >> photos.json
            else
              echo "    ]" >> photos.json
            fi
          done

          # 6. Close the outer dictionary brackets securely
          echo "  }" >> photos.json
          echo "}" >> photos.json

      - name: Commit and Push Changes back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add photos.json
          # Note: The custom "[skip ci]" tag prevents infinite action loop recurrences
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update nested category galleries [skip ci]" && git push)
