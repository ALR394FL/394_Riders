name: Sync Google Drive Documents
on:
  schedule:
    - cron: '0 * * * *' # Automatically runs every single hour
  workflow_dispatch: # Allows you to manually trigger a sync with one click

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2 # Bypasses the Node 20 deprecation warning

      - name: Set up Python
        uses: actions/setup-python@v5.4.0 # Bypasses the Node 20 deprecation warning
        with:
          python-version: '3.10'

      - name: Install Google API Client
        run: pip install google-auth-oauthlib google-api-python-client

      - name: Run Sync Script
        env:
          DRIVE_CREDENTIALS: ${{ secrets.DRIVE_CREDENTIALS }}
          FOLDER_ID: '1B3qd5KGoPkSb-X5aUIJHaDBlqOCz87Qh' # Replace this text with your actual ID string
        run: python .github/scripts/sync_drive.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'Drive Sync Bot'
          git config --global user.email 'bot@github.com'
          git add documents/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync documents from Google Drive" && git push)
