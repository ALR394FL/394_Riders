name: Sync Google Drive Documents

on:
  schedule:
    - cron: '0 * * * *' # Automatically runs every single hour
  workflow_dispatch: # Allows you to manually trigger a sync with one click

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants explicit permission for GitHub Actions to push code

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2 # Bypasses Node 20 deprecation warnings

      - name: Set up Python
        uses: actions/setup-python@v5.4.0 # Bypasses Node 20 deprecation warnings
        with:
          python-version: '3.10'

      - name: Install Google API Client
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-api-python-client

      - name: Run Sync Script
        env:
          DRIVE_CREDENTIALS: ${{ secrets.DRIVE_CREDENTIALS }}
          FOLDER_ID: '1B3qd5KGoPkSb-X5aUIJHaDBlqOCz87Qh'
        run: python .github/scripts/sync_drive.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'Drive Sync Bot'
          git config --global user.email 'bot@github.com'
          
          # Stage both sorted directory pathways
          git add documents/ images/
          
          # Safely check for changes before attempting a commit to prevent empty-run errors
          if ! git diff --cached --quiet; then
            git commit -m "Auto-sync and categorize media/documents from Google Drive"
            git push
          else
            echo "No new document or image updates found in Drive folder."
          fi
