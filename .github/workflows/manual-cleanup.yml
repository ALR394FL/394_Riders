name: Manual Asset Cleanup

on:
  workflow_dispatch: # This adds the "Run workflow" action button to your dashboard

jobs:
  cleanup-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-api-python-client requests

      - name: Run Safe Cleanup Execution
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRIVE_CREDENTIALS: ${{ secrets.DRIVE_CREDENTIALS }}
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }} # Provided automatically by GitHub
        run: python .github/scripts/cleanup.py
